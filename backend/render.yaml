services:
  - type: web
    name: vidlink-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free
    envVars:
      - key: RAPIDAPI_KEY
        sync: false   # Render dashboard থেকে manually দাও
    healthCheckPath: /
    autoDeploy: true
